name: maeulbot-scrum

on:
  schedule:
    - cron: '28 0 * * 1-5'   # KST 09:28 월~금
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send scrum message
        shell: bash
        run: |
          set -euo pipefail

          MSG=$'스크럼 작성 시간입니다!\n오늘의 사항을 공유해주세요 :memo:'

          export MSG
          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"text": os.environ["MSG"], "username": "maeulbot"}))')

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP_CODE=$HTTP_CODE"
          cat response.txt || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Webhook send failed." >&2
            exit 1
          fi
