name: maeulbot
on:
  workflow_dispatch:
    inputs:
      test_time:
        description: '테스트할 알림 (checkin / scrum / retrospective)'
        required: true
        type: choice
        options:
          - checkin
          - scrum
          - retrospective
  schedule:
    - cron: '45 23 * * 0-4'  # 입실 체크 08:45 KST
    - cron: '28 0  * * 1-5'  # 스크럼    09:28 KST
    - cron: '20 8  * * 1-5'  # 회고록    17:20 KST

jobs:
  notify:
    name: 알림 발송
    runs-on: ubuntu-latest
    steps:
      - name: Detect schedule and send notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TEST_INPUT: ${{ github.event.inputs.test_time }}
        run: |
          if [ -n "$TEST_INPUT" ]; then
            NOW="$TEST_INPUT"
            echo "Manual trigger — test target: $NOW"
          else
            NOW=$(date -u +"%H:%M")
            echo "Scheduled trigger — UTC time: $NOW"
          fi

          case "$NOW" in
            "23:45"|"checkin")
              MESSAGE=" **입실 체크** 안녕하세요! 늦지 않게 입실 체크 부탁드립니다 :wave:"
              ;;
            "00:28"|"scrum")
              MESSAGE=" **스크럼 시간입니다!** 오늘 할 작업 내용을 공유해주세요 :speech_balloon:"
              ;;
            "08:20"|"retrospective")
              MESSAGE="**오늘도 돌아온 회고록 작성 시간입니다.** 잘한 점, 개선할 점, 해야할 일을 정리해 남겨주세요 :pencil:"
              ;;
            *)
              echo "No matching schedule for $NOW — skip."
              exit 0
              ;;
          esac

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${MESSAGE}\"}"
