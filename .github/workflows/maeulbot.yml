
name: maeulbot

on:
  schedule:
    # 모든 cron 시간은 UTC 기준 (KST = UTC+9)
    - cron: '45 23 * * 0-4'  # 입실 체크 08:45 KST (전날 23:45 UTC, 월~금)
    - cron: '28 0  * * 1-5'  # 스크럼    09:28 KST (00:28 UTC, 월~금)
    - cron: '55 5  * * 1-5'  # 스트레칭  14:55 KST (05:55 UTC, 월~금)
    - cron: '20 8  * * 1-5'  # 회고록    17:20 KST (08:20 UTC, 월~금)

jobs:
  checkin:
    name: 입실 체크 알림
    runs-on: ubuntu-latest
    if: github.event.schedule == '45 23 * * 0-4'
    steps:
      - name: Send Mattermost notification
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text": " **입실 체크** 안녕하세요! 늦지 않게 입실 체크 부탁드립니다 :wave:"}'

  scrum:
    name: 스크럼 알림
    runs-on: ubuntu-latest
    if: github.event.schedule == '28 0 * * 1-5'
    steps:
      - name: Send Mattermost notification
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text": " **스크럼 시간입니다!** 어제와 오늘의 작업 내용을 공유해주세요 :speech_balloon:"}'

  stretching:
    name: 스트레칭 알림
    runs-on: ubuntu-latest
    if: github.event.schedule == '55 5 * * 1-5'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and send Mattermost notification
        run: |
          # JSON에서 랜덤 항목 1개 선택
          total=$(jq 'length' .github/data/stretching_messages.json)
          index=$(( RANDOM % total ))
          item=$(jq ".[$index]" .github/data/stretching_messages.json)

          # 필드 파싱
          title=$(echo "$item" | jq -r '.title')
          emoji=$(echo "$item" | jq -r '.emoji')
          target=$(echo "$item" | jq -r '.target')

          # 스텝 목록 조합
          steps_text=""
          step_count=$(echo "$item" | jq '.steps | length')
          for i in $(seq 0 $(( step_count - 1 ))); do
            num=$(( i + 1 ))
            name=$(echo "$item" | jq -r ".steps[$i].name")
            desc=$(echo "$item" | jq -r ".steps[$i].desc")
            dur=$(echo "$item"  | jq -r ".steps[$i].duration")
            steps_text+="${num}. **${name}** (${dur})\\n   ${desc}\\n"
          done

          # 최종 메시지 조합
          message="╔══════════════════════════════════╗\\n"
          message+="${emoji} 오늘의 스트레칭 : ${title} ${emoji}\\n"
          message+="╚══════════════════════════════════╝\\n"
          message+="소중한 **${target}**을 앉은 자세에서 풀어줍니다.\\n\\n"
          message+="${steps_text}"
          message+="\\n⚠️ 무리하지 말고 천천히 진행하세요.\\n통증이 느껴지면 즉시 멈추세요."

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${message}\"}"

  retrospective:
    name: 회고록 알림
    runs-on: ubuntu-latest
    if: github.event.schedule == '20 8 * * 1-5'
    steps:
      - name: Send Mattermost notification
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text": "**오늘도 돌아온 회고록 작성 시간입니다.** 잘한 점, 개선할 점, 보완할 점을 정리해 남겨주세요 :pencil:"}'