name: maeulbot

on:
  workflow_dispatch:
    inputs:
      test_time:
        description: '테스트할 알림 (checkin / scrum / retrospective)'
        required: true
        type: choice
        options:
          - checkin
          - scrum
          - retrospective

  schedule:
    - cron: '*/5 * * * 0-4'   # UTC 일~목 = KST 월~금, 5분마다

permissions:
  contents: write

jobs:
  notify:
    name: 알림 발송
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 예약 알림 발송 (schedule)
        if: github.event_name == 'schedule'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail

          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

          STATE_FILE=".bot_state"

          TODAY="$(TZ=Asia/Seoul date '+%Y-%m-%d')"
          HM_NOW="$(TZ=Asia/Seoul date '+%H:%M')"
          DOW_NOW="$(TZ=Asia/Seoul date '+%u')"   # 1=Mon ... 7=Sun

          # 평일만 발송
          if [ "$DOW_NOW" -lt 1 ] || [ "$DOW_NOW" -gt 5 ]; then
            echo "주말이므로 발송하지 않음"
            exit 0
          fi

          LAST_DATE=""
          LAST_CHECKIN=""
          LAST_SCRUM=""
          LAST_RETRO=""

          if [ -f "$STATE_FILE" ]; then
            # shellcheck disable=SC1090
            source "$STATE_FILE"
            LAST_DATE="${LAST_DATE:-}"
            LAST_CHECKIN="${LAST_CHECKIN:-}"
            LAST_SCRUM="${LAST_SCRUM:-}"
            LAST_RETRO="${LAST_RETRO:-}"
          fi

          # 날짜가 바뀌면 발송 기록 초기화
          if [ "$LAST_DATE" != "$TODAY" ]; then
            LAST_DATE="$TODAY"
            LAST_CHECKIN="0"
            LAST_SCRUM="0"
            LAST_RETRO="0"
          fi

          MESSAGE=""
          SEND_TYPE=""

          # 5분마다 도는 특성을 이용해 "지정 시각 이상이면 발송" 처리
          # 실행이 조금 늦어져도 아직 안 보냈으면 catch-up 가능
          if [ "$LAST_CHECKIN" != "1" ] && [[ "$HM_NOW" > "08:50" ]]; then
            SEND_TYPE="checkin"
            MESSAGE="**입실 체크** 안녕하세요! 늦지 않게 입실 체크 부탁드립니다 :wave:"
          elif [ "$LAST_SCRUM" != "1" ] && [[ "$HM_NOW" > "09:20" ]]; then
            SEND_TYPE="scrum"
            MESSAGE="**스크럼 시간입니다!** 오늘 할 작업 내용을 공유해주세요 :speech_balloon:"
          elif [ "$LAST_RETRO" != "1" ] && [[ "$HM_NOW" > "17:10" ]]; then
            SEND_TYPE="retrospective"
            MESSAGE="**오늘도 돌아온 회고록 작성 시간입니다.** 잘한 점, 개선할 점, 해야할 일을 정리해 남겨주세요 :pencil:"
          else
            echo "현재 발송할 알림 없음 (KST $HM_NOW)"
            exit 0
          fi

          echo "선택된 알림: $SEND_TYPE"

          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${MESSAGE}\"}")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $(cat /tmp/response.txt)"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Webhook 전송 실패"
            exit 1
          fi

          case "$SEND_TYPE" in
            checkin) LAST_CHECKIN="1" ;;
            scrum) LAST_SCRUM="1" ;;
            retrospective) LAST_RETRO="1" ;;
          esac

          cat > "$STATE_FILE" <<EOF
          LAST_DATE=$LAST_DATE
          LAST_CHECKIN=$LAST_CHECKIN
          LAST_SCRUM=$LAST_SCRUM
          LAST_RETRO=$LAST_RETRO
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$STATE_FILE"
          git diff --cached --quiet || git commit -m "Update maeulbot state for $TODAY"
          git push

      - name: 수동 테스트 (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TEST_INPUT: ${{ github.event.inputs.test_time }}
        shell: bash
        run: |
          set -euo pipefail

          case "$TEST_INPUT" in
            checkin)
              MESSAGE=" 안녕하세요! 늦지 않게 **입실 체크** 부탁드립니다 :wave:"
              ;;
            scrum)
              MESSAGE="**스크럼 시간입니다!** 오늘 할 작업 내용을 공유해주세요 :speech_balloon:"
              ;;
            retrospective)
              MESSAGE="**오늘도 돌아온 회고록 작성 시간입니다.** 잘한 점, 개선할 점, 해야할 일을 정리해 남겨주세요 :pencil:"
              ;;
            *)
              echo "알 수 없는 TEST_INPUT: $TEST_INPUT"
              exit 1
              ;;
          esac

          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${MESSAGE}\"}")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $(cat /tmp/response.txt)"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Webhook 전송 실패"
            exit 1
          fi
