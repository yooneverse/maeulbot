name: maeulbot

on:
  workflow_dispatch:
    inputs:
      test_time:
        description: '테스트할 알림 (checkin / scrum / stretching / retrospective)'
        required: true
        type: choice
        options:
          - checkin
          - scrum
          - stretching
          - retrospective
  schedule:
    - cron: '45 23 * * 0-4'  # 입실 체크 08:45 KST
    - cron: '28 0  * * 1-5'  # 스크럼    09:28 KST
    - cron: '55 5  * * 1-5'  # 스트레칭  14:55 KST
    - cron: '20 8  * * 1-5'  # 회고록    17:20 KST

jobs:
  notify:
    name: 알림 발송
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect schedule and send notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TEST_INPUT: ${{ github.event.inputs.test_time }}
        run: |
          # workflow_dispatch 실행 시 input으로 분기, schedule 실행 시 UTC 시각으로 분기
          if [ -n "$TEST_INPUT" ]; then
            NOW="$TEST_INPUT"
            echo "Manual trigger — test target: $NOW"
          else
            NOW=$(date -u +"%H:%M")
            echo "Scheduled trigger — UTC time: $NOW"
          fi

          case "$NOW" in

            # 입실 체크 — 08:45 KST → 23:45 UTC
            "23:45"|"checkin")
              MESSAGE=" **입실 체크** 안녕하세요! 늦지 않게 입실 체크 부탁드립니다 :wave:"
              ;;

            # 스크럼 — 09:28 KST → 00:28 UTC
            "00:28"|"scrum")
              MESSAGE=" **스크럼 시간입니다!** 어제와 오늘의 작업 내용을 공유해주세요 :speech_balloon:"
              ;;

            # 스트레칭 — 14:55 KST → 05:55 UTC
            "05:55"|"stretching")
              total=$(jq 'length' .github/data/stretching_messages.json)
              index=$(( RANDOM % total ))
              item=$(jq ".[$index]" .github/data/stretching_messages.json)

              title=$(echo "$item" | jq -r '.title')
              emoji=$(echo "$item" | jq -r '.emoji')
              target=$(echo "$item" | jq -r '.target')

              steps_text=""
              step_count=$(echo "$item" | jq '.steps | length')
              for i in $(seq 0 $(( step_count - 1 ))); do
                num=$(( i + 1 ))
                sname=$(echo "$item" | jq -r ".steps[$i].name")
                desc=$(echo "$item"  | jq -r ".steps[$i].desc")
                dur=$(echo "$item"   | jq -r ".steps[$i].duration")
                steps_text+="${num}. **${sname}** (${dur})\n   ${desc}\n"
              done

              MESSAGE="╔══════════════════════════════════╗\n"
              MESSAGE+="${emoji} 오늘의 스트레칭 : ${title} ${emoji}\n"
              MESSAGE+="╚══════════════════════════════════╝\n"
              MESSAGE+="소중한 **${target}**을 앉은 자세에서 풀어줍니다.\n\n"
              MESSAGE+="${steps_text}"
              MESSAGE+="\n⚠️ 무리하지 말고 천천히 진행하세요.\n통증이 느껴지면 즉시 멈추세요."
              ;;

            # 회고록 — 17:20 KST → 08:20 UTC
            "08:20"|"retrospective")
              MESSAGE="**오늘도 돌아온 회고록 작성 시간입니다.** 잘한 점, 개선할 점, 보완할 점을 정리해 남겨주세요 :pencil:"
              ;;

            *)
              echo "No matching schedule for $NOW — skip."
              exit 0
              ;;
          esac

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${MESSAGE}\"}"
