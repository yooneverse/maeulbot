name: maeulbot-checkin

on:
  schedule:
    - cron: '50 23 * * 0-4'   # KST 08:50 월~금
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send checkin message
        shell: bash
        run: |
          set -euo pipefail

          MSG="좋은 아침입니다! 늦지 않게 입실 체크해주세요 :slightly_smiling_face:"

          export MSG
          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"text": os.environ["MSG"], "username": "maeulbot"}))')

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP_CODE=$HTTP_CODE"
          cat response.txt || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Webhook send failed." >&2
            exit 1
          fi
