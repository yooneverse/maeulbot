name: maeulbot

on:
  schedule:
    # GitHub Actions cron은 UTC 기준 → KST = UTC+9
    - cron: '50 23 * * 0-4'  # 08:50 KST (월~금)
    - cron: '0  1  * * 1-5'  # 10:00 KST
    - cron: '0  3  * * 1-5'  # 12:00 KST
    - cron: '0  6  * * 1-5'  # 15:00 KST
    - cron: '20 8  * * 1-5'  # 17:20 KST
    - cron: '40 8  * * 1-5'  # 17:40 KST
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Mattermost message (with logs)
        shell: bash
        run: |
          set -euo pipefail

          echo "=== META ==="
          echo "Repo     : ${GITHUB_REPOSITORY}"
          echo "Ref      : ${GITHUB_REF}"
          echo "Run ID   : ${GITHUB_RUN_ID}"
          echo "SHA      : ${GITHUB_SHA}"

          echo "=== TIME CHECK ==="
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

          TIME_NOW=$(date -u '+%H:%M')
          TIME_PREV=$(date -u -d '1 minute ago' '+%H:%M')
          echo "TIME_NOW (UTC) = $TIME_NOW"
          echo "TIME_PREV(UTC) = $TIME_PREV"

          pick_message () {
            local t="$1"
            case "$t" in
              "23:50")
                echo "🏁 좋은 아침입니다! 지금 바로 입실 체크해주세요 :slightly_smiling_face:"
                ;;
              "01:00")
                echo -e "📋 오전 스크럼 작성 시간입니다!\n오늘의 계획을 간단히 작성해주세요 :memo:"
                ;;
              "03:00")
                echo -e "⏰ 오전 스크럼 마감입니다!\n아직 작성 못 하신 분들은 지금 바로 등록해주세요 :bell:"
                ;;
              "06:00")
                STRETCHES=(
                  "오늘의 스트레칭: 눈 피로 해소 \n\n1. 20-20-20 법칙 (20초)\n   20분마다 6m 이상 떨어진 곳을 20초간 바라봅니다.\n2. 눈동자 8자 트레이싱 (30초)\n   눈을 감고 눈동자로 천천히 ∞ 모양을 그립니다.\n3. 강하게 깜빡이기 (10회)\n   눈을 꽉 감았다가 크게 뜨기를 10회 반복합니다.\n4. 손바닥 온찜질 (30초)\n   양손을 비벼 따뜻하게 한 뒤 눈 위에 살짝 올립니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂"
                  "오늘의 스트레칭: 목 긴장 완화 \n\n1. 측면 목 늘리기 (15초 × 양쪽)\n   오른손을 머리 왼쪽에 얹고 오른쪽으로 천천히 기울입니다.\n2. 턱 당기기 Chin Tuck (5초 × 10회)\n   이중턱을 만들 듯 턱을 수직으로 뒤로 당깁니다.\n3. 목 반원 굴리기 (3회 왕복)\n   왼쪽 어깨에서 앞쪽 반원을 그리며 오른쪽 어깨까지 굴립니다.\n4. 후두부 누르기 (5초 × 5회)\n   양손을 뒤통수에 대고 머리로 손을 밀어냅니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂"
                  "오늘의 스트레칭: 어깨·등 결림 해소 \n\n1. 어깨 으쓱 & 내리기 (10회)\n   어깨를 귀 쪽으로 올린 뒤 3초 유지 후 힘을 빼고 떨어뜨립니다.\n2. 가슴 열기 체어 스트레치 (15초 × 3세트)\n   등받이 뒤로 깍지 끼고 가슴을 천장 방향으로 열어줍니다.\n3. 견갑골 모으기 (5초 × 10회)\n   팔꿈치를 90도로 들고 날개뼈를 뒤에서 서로 모아줍니다.\n4. 앞쪽 등 둥글게 말기 (10초 × 5회)\n   양손을 무릎에 놓고 등을 고양이처럼 둥글게 말며 숨을 내쉽니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂"
                  "오늘의 스트레칭: 손목·손가락 피로 해소 \n\n1. 손목 굴신 스트레칭 (15초 × 양방향 × 양쪽)\n   팔을 뻗고 손가락을 잡아 손등·손바닥 방향 교대로 젖힙니다.\n2. 손가락 벌리기 (10회)\n   주먹을 꽉 쥐었다가 손가락을 최대한 활짝 폅니다.\n3. 손목 돌리기 (10회 양방향)\n   가볍게 주먹 쥐고 시계·반시계 방향으로 천천히 돌립니다.\n4. 손바닥 밀기 (10초 × 3회)\n   양 손바닥을 합장한 채 손끝을 위로 향하게 하고 천천히 내립니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂"
                  "오늘의 스트레칭: 허리·골반 이완 \n\n1. 의자 비틀기 Seated Twist (15초 × 양쪽)\n   등받이를 잡고 상체를 천천히 좌우로 비틀어줍니다.\n2. 무릎 가슴으로 당기기 (15초 × 양쪽)\n   한쪽 무릎을 양손으로 감싸 가슴 쪽으로 당깁니다.\n3. 골반 기울이기 Pelvic Tilt (10회)\n   허리를 꺾었다가 배꼽을 당겨 납작하게 누르기를 반복합니다.\n4. 앞으로 구부리기 (15초 × 3회)\n   양발을 바닥에 붙이고 상체를 천천히 앞으로 숙입니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂"
                  "오늘의 스트레칭: 하체 혈액순환 촉진 \n\n1. 발뒤꿈치 올렸다 내리기 (15회)\n   발뒤꿈치를 최대한 들어 올렸다가 천천히 내립니다.\n2. 발끝 당기기 Dorsiflexion (15초 × 양쪽)\n   다리를 곧게 뻗고 발끝을 몸 쪽으로 당겨 종아리를 늘립니다.\n3. 발목 알파벳 쓰기 (A–Z 양발)\n   발을 들고 발목만으로 허공에 알파벳을 씁니다.\n4. 발가락 쥐었다 펴기 (10회)\n   발가락을 꽉 오므렸다가 활짝 펴기를 반복합니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂"
                )
                IDX=$(( RANDOM % ${#STRETCHES[@]} ))
                echo -e "${STRETCHES[$IDX]}"
                ;;
              "08:20")
                echo -e "📝 오늘의 회고록 작성 시간입니다!\n해낸 점, 아쉬운 점, 앞으로의 계획을 적어보세요 :pencil:"
                ;;
              "08:40")
                echo -e "🔔 회고록 마감 20분 전입니다!\n아직 작성 못 하신 분들, 지금이 마지막 기회예요 :fire:"
                ;;
              *)
                return 1
                ;;
            esac
          }

          if MSG=$(pick_message "$TIME_NOW"); then
            MATCHED_TIME="$TIME_NOW"
          elif MSG=$(pick_message "$TIME_PREV"); then
            MATCHED_TIME="$TIME_PREV"
          else
            echo "NO MATCH -> exit 0"
            exit 0
          fi

          echo "=== MESSAGE PICKED ==="
          echo "MATCHED_TIME(UTC) = $MATCHED_TIME"
          echo -e "MSG:\n$MSG"

          echo "=== BUILD JSON (safe) ==="
          export MSG
          PAYLOAD=$(python3 - << 'PY'
import json, os
print(json.dumps({
  "text": os.environ["MSG"],
  "username": "JIYOONBOT"
}))
PY
          )
          echo "$PAYLOAD" | head -c 300; echo

          echo "=== POST TO MATTERMOST ==="
          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")

          echo "HTTP_CODE=$HTTP_CODE"
          echo "---- response body ----"
          cat response.txt || true
          echo "-----------------------"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Webhook failed"
            exit 1
          fi
