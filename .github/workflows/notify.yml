name: maeulbot

on:
  schedule:
    # GitHub Actions cron은 UTC 기준 → KST = UTC+9
    - cron: '50 23 * * 0-4'  # 08:50 KST (월~금) - 입실 마감 알림
    - cron: '30  0 * * 1-5'  # 09:30 KST (월~금) - 스크럼 알림
    - cron: '0   6 * * 1-5'  # 15:00 KST (월~금) - 스트레칭
    - cron: '20  8 * * 1-5'  # 17:20 KST (월~금) - 회고 시작

# ✅ 큐 파일(.stretch_queue)을 커밋/푸시하려면 write 권한 필요
permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      # ✅ repo 파일(.stretch_queue) 쓰려면 체크아웃이 필요
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Mattermost scheduled message only
        shell: bash
        run: |
          set -euo pipefail

          # ✅ 스케줄 실행이 아니면 절대 전송하지 않음
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "Not schedule event (${GITHUB_EVENT_NAME}). Exit without sending."
            exit 0
          fi

          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

          TIME_NOW=$(date -u '+%H:%M')
          TIME_PREV=$(date -u -d '1 minute ago' '+%H:%M')
          echo "TIME_NOW(UTC)=$TIME_NOW"
          echo "TIME_PREV(UTC)=$TIME_PREV"

          QUEUE_FILE=".stretch_queue"

          # ----------------------------
          # 스트레칭 목록(변경/추가 가능)
          # ----------------------------
          STRETCHES=(
            $'🧘 오늘의 스트레칭: 눈 피로 풀기\n\n개발자는 눈이죠.\n\n1. 멀리 보기 (20초)\n   모니터에서 눈을 떼고, 창문 너머 멀리 있는 것을 20초 동안 바라봅니다.\n2. 눈 천천히 굴리기 (30초)\n   눈을 감고, 위 → 오른쪽 → 아래 → 왼쪽 순서로 천천히 돌립니다.\n3. 눈 꽉 감았다 크게 뜨기 (10회)\n   눈을 꽉 감았다가 크게 뜨기를 10번 반복합니다.\n4. 손바닥으로 눈 덮기 (30초)\n   양손을 비벼 따뜻하게 만든 뒤, 눈 위에 살짝 올려놓고 쉽니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 목 풀기\n\n그거 아세요? 목이 시원해야 다 시원합니다.\n\n1. 옆으로 목 기울이기 (15초 × 양쪽)\n   오른손을 머리 왼쪽에 살짝 얹고 오른쪽으로 천천히 기울입니다. 반대쪽도 반복합니다.\n2. 턱 당기기 (5초 × 10회)\n   턱을 뒤로 당겨 이중턱 모양을 만들었다가 천천히 풉니다.\n3. 고개 좌우로 돌리기 (10회)\n   고개를 천천히 오른쪽으로 돌려 3초 유지, 왼쪽도 반복합니다.\n4. 뒤통수 밀기 (5초 × 5회)\n   양손을 뒤통수에 대고, 머리로 손바닥을 지그시 밀어냅니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 어깨 풀기\n\n내 어깨에 있는 모든 프로젝트를 떨칠 순..없으니까 스트레칭으로 개운해져 봅시다.\n\n1. 어깨 으쓱하기 (10회)\n   어깨를 귀 쪽으로 끌어올렸다가 힘을 빼고 툭 떨어뜨립니다.\n2. 팔꿈치로 원 그리기 (10회 × 양방향)\n   손끝을 어깨에 얹고, 팔꿈치로 앞→위→뒤→아래 방향으로 크게 원을 그립니다.\n3. 한 팔 가슴 앞으로 당기기 (15초 × 양쪽)\n   오른팔을 가슴 앞으로 뻗고, 왼손으로 팔꿈치를 몸 쪽으로 지그시 당깁니다.\n4. 깍지 끼고 위로 쭉 뻗기 (10초 × 3회)\n   양손을 깍지 낀 채 머리 위로 뻗어 올려 옆구리까지 늘려줍니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 손목·손가락 풀기\n\n나간 손목과 손가락 감각은 잘 돌아오지 않아요...\n\n1. 손목 앞뒤로 꺾기 (15초 × 양쪽)\n   팔을 앞으로 뻗고 손가락을 잡아 손등·손바닥 방향으로 번갈아 꺾습니다.\n2. 손가락 쫙 펴기 (10회)\n   주먹을 꽉 쥐었다가 손가락을 최대한 활짝 폅니다.\n3. 손목 돌리기 (10회 × 양방향)\n   가볍게 주먹 쥐고 시계 방향, 반시계 방향으로 천천히 돌립니다.\n4. 양 손바닥 맞대고 누르기 (10초 × 3회)\n   합장 자세로 손끝을 위로 향하게 하고 천천히 아래로 내립니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 등·허리 풀기\n\n여러분의 키..소중하니까!\n\n1. 등 동그랗게 말기 (10초 × 5회)\n   양손을 무릎에 놓고 등을 둥글게 말며 숨을 내쉽니다.\n2. 의자에서 몸통 비틀기 (15초 × 양쪽)\n   등받이를 잡고 상체를 좌우로 천천히 비틀어줍니다.\n3. 무릎 가슴으로 당기기 (15초 × 양쪽)\n   한쪽 무릎을 양손으로 감싸 가슴 쪽으로 당겨줍니다.\n4. 앞으로 천천히 숙이기 (15초 × 3회)\n   양발을 바닥에 붙인 채 상체를 천천히 앞으로 숙입니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 다리·발 풀기\n\n쭉쭉 펴줘야 건강한 다리와 발!\n\n1. 발뒤꿈치 올렸다 내리기 (15회)\n   발뒤꿈치를 최대한 높이 들었다가 천천히 내립니다.\n2. 무릎 위로 들었다 내리기 (10회 × 양쪽)\n   한쪽 무릎을 천천히 들어 올렸다가 내립니다. 반대쪽도 반복합니다.\n3. 다리 쭉 뻗고 발끝 당기기 (15초 × 양쪽)\n   다리를 앞으로 곧게 뻗은 뒤, 발끝을 몸 쪽으로 당겨 종아리를 늘려줍니다.\n4. 발가락 오므렸다 펴기 (10회)\n   발가락을 꽉 오므렸다가 활짝 펴기를 반복합니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 가슴·옆구리 풀기\n\n늘 뻐근한 곳! 풀어줘야겠죠?\n\n1. 가슴 활짝 열기 (15초 × 3회)\n   등 뒤에서 깍지를 끼고 가슴을 천장 쪽으로 열어줍니다.\n2. 옆으로 기울이기 (15초 × 양쪽)\n   한 손을 허벅지에 얹고 반대 팔을 머리 위로 뻗어 옆으로 천천히 기울입니다.\n3. 깍지 끼고 앞으로 쭉 밀기 (10초 × 3회)\n   양손을 깍지 낀 채 손바닥이 앞을 보도록 팔을 앞으로 뻗어 등을 늘려줍니다.\n4. 어깨 뒤로 당기기 (5초 × 10회)\n   양 팔꿈치를 구부려 옆구리에 붙이고 뒤로 힘껏 당겼다가 풉니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🏃 오늘은 전신운동: 의자 스쿼트\n\n일어서고 앉는 동작만으로 온몸을 쓰는 가장 간단한 전신 운동입니다!\n\n1. 준비 자세\n   의자 앞쪽에 얕게 걸터앉고, 발은 어깨 너비로 벌려 바닥에 붙입니다.\n2. 일어서기\n   상체를 살짝 앞으로 기울이며 천천히 일어섭니다. 무릎이 발끝보다 앞으로 나오지 않게 합니다.\n3. 앉기\n   엉덩이를 뒤로 빼듯이 천천히 앉습니다. 의자에 닿는 순간 다시 일어섭니다.\n4. 10회 반복, 총 2세트\n   세트 사이에 30초 쉬어줍니다.\n\n💡 무릎이 불편하면 의자에 완전히 앉았다가 일어나도 괜찮아요!\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
            $'🧘 오늘의 스트레칭: 하지 풀기\n\n오래 앉아 있으면 뭉치기 쉬운 허벅지·종아리·무릎 주변을 풀어줍니다!\n\n1. 허벅지 앞쪽 늘리기 (15초 × 양쪽)\n   의자 옆에 서서 한 손으로 등받이를 잡고, 반대 손으로 발목을 잡아 발꿈치를 엉덩이 쪽으로 당깁니다.\n2. 허벅지 뒤쪽 늘리기 (15초 × 양쪽)\n   의자에 앉아 한쪽 다리를 앞으로 쭉 뻗고, 발끝을 세운 채 상체를 천천히 앞으로 숙입니다.\n3. 종아리 늘리기 (15초 × 양쪽)\n   의자 등받이를 두 손으로 잡고, 한 발을 뒤로 뻗어 뒤꿈치를 바닥에 붙인 채 앞 무릎을 살짝 구부립니다.\n4. 무릎 천천히 펴고 접기 (10회 × 양쪽)\n   의자에 앉아 한쪽 다리를 들어 천천히 무릎을 펴고, 다시 천천히 접습니다.\n\n무리하지 말고 천천히! 몸이 불편하면 바로 멈추세요 🙂'
          )

          # ----------------------------
          # 셔플 큐 유틸
          # - 큐 파일에 "인덱스"를 저장(문자열 저장보다 안전)
          # ----------------------------
          ensure_queue () {
            # STRETCHES 길이 계산
            local n="${#STRETCHES[@]}"

            # 스트레칭이 0개면 방어
            if [ "$n" -le 0 ]; then
              echo "STRETCHES array is empty" >&2
              return 1
            fi

            # 큐 파일이 없거나 비었으면: 0..n-1 인덱스를 셔플해서 생성
            if [ ! -f "$QUEUE_FILE" ] || [ ! -s "$QUEUE_FILE" ]; then
              shuf -i "0-$((n - 1))" > "$QUEUE_FILE"
            fi
          }

          pop_stretch_message () {
            ensure_queue

            # 첫 줄 인덱스
            local idx
            idx="$(head -n 1 "$QUEUE_FILE")"

            # 숫자 검증(파일 깨졌을 때 방어)
            if ! [[ "$idx" =~ ^[0-9]+$ ]]; then
              echo "Queue corrupted (idx=$idx). Rebuilding queue..." >&2
              rm -f "$QUEUE_FILE"
              ensure_queue
              idx="$(head -n 1 "$QUEUE_FILE")"
            fi

            # 범위 검증(인덱스가 배열 범위를 벗어나면 재생성)
            if [ "$idx" -ge "${#STRETCHES[@]}" ]; then
              echo "Queue idx out of range (idx=$idx). Rebuilding queue..." >&2
              rm -f "$QUEUE_FILE"
              ensure_queue
              idx="$(head -n 1 "$QUEUE_FILE")"
            fi

            # 사용한 줄 제거
            tail -n +2 "$QUEUE_FILE" > "${QUEUE_FILE}.tmp" || true
            mv "${QUEUE_FILE}.tmp" "$QUEUE_FILE"

            # 꺼낸 뒤 큐가 비면 다시 셔플
            ensure_queue

            # 메시지 출력
            printf "%s" "${STRETCHES[$idx]}"
          }

          pick_message () {
            local t="$1"
            case "$t" in
              "23:50")
                echo "좋은 아침입니다! 늦지 않게 입실 체크해주세요 :slightly_smiling_face:"
                ;;
              "00:30")
                echo -e "스크럼 작성 시간입니다!\n오늘의 사항을 공유해주세요 :memo:"
                ;;
              "06:00")
                # ✅ 중복 없는 셔플 큐에서 1개 꺼내기
                pop_stretch_message
                ;;
              "08:20")
                echo -e "오늘도 돌아온 회고록 작성 시간입니다!\n해낸 점, 아쉬운 점, 앞으로의 계획을 적어보세요 :pencil:"
                ;;
              *)
                return 1
                ;;
            esac
          }

          # 시간 매칭 (현재/1분전)
          if MSG=$(pick_message "$TIME_NOW"); then
            :
          elif MSG=$(pick_message "$TIME_PREV"); then
            :
          else
            echo "No scheduled message for this time -> exit 0"
            exit 0
          fi

          # ----------------------------
          # (중요) 스트레칭 시간(06:00 UTC)일 때만 큐 파일 커밋/푸시
          # - 다른 알림 시간엔 repo 변경이 없어야 함
          # ----------------------------
          if [ "$TIME_NOW" = "06:00" ] || [ "$TIME_PREV" = "06:00" ]; then
            echo "Updating stretch queue file (persist state)..."
            git config user.name  "maeulbot"
            git config user.email "maeulbot@users.noreply.github.com"

            git add "$QUEUE_FILE" || true

            # 변경 없으면 커밋 스킵
            if git diff --cached --quiet; then
              echo "No queue changes to commit."
            else
              git commit -m "chore: rotate stretch queue" || true
              git push || true
            fi
          fi

          # ----------------------------
          # Mattermost 전송
          # ----------------------------
          echo "Sending message..."
          export MSG
          PAYLOAD=$(python3 -c 'import json,os; print(json.dumps({"text": os.environ["MSG"], "username":"maeulbot"}))')

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP_CODE=$HTTP_CODE"
          cat response.txt || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
