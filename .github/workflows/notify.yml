name: maeulbot

on:
  schedule:
    - cron: '50 23 * * 0-4'  # 08:50 KST (월~금)
    - cron: '0 1 * * 1-5'    # 10:00 KST
    - cron: '0 3 * * 1-5'    # 12:00 KST
    - cron: '0 6 * * 1-5'    # 15:00 KST
    - cron: '20 8 * * 1-5'   # 17:20 KST
    - cron: '40 8 * * 1-5'   # 17:40 KST
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Mattermost (with logs)
        shell: bash
        run: |
          set -euo pipefail

          echo "=== META ==="
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

          TIME_NOW=$(date -u '+%H:%M')
          TIME_PREV=$(date -u -d '1 minute ago' '+%H:%M')
          echo "TIME_NOW(UTC)=$TIME_NOW"
          echo "TIME_PREV(UTC)=$TIME_PREV"

          pick_message () {
            local t="$1"
            case "$t" in
              "23:50")
                echo "🏁 좋은 아침입니다! 지금 바로 입실 체크해주세요 :slightly_smiling_face:"
                ;;
              "01:00")
                echo -e "📋 오전 스크럼 작성 시간입니다!\n오늘의 계획을 간단히 작성해주세요 :memo:"
                ;;
              "03:00")
                echo -e "⏰ 오전 스크럼 마감입니다!\n아직 작성 못 하신 분들은 지금 바로 등록해주세요 :bell:"
                ;;
              "06:00")
                STRETCHES=(
                  "오늘의 스트레칭: 눈 피로 해소\n\n1. 20-20-20 법칙 (20초)\n2. 눈동자 8자 트레이싱 (30초)\n3. 강하게 깜빡이기 (10회)\n4. 손바닥 온찜질 (30초)\n\n무리하지 말고 천천히! 🙂"
                  "오늘의 스트레칭: 목 긴장 완화\n\n1. 측면 목 늘리기 (15초×양쪽)\n2. 턱 당기기 (5초×10회)\n3. 목 반원 굴리기 (3회 왕복)\n4. 후두부 누르기 (5초×5회)\n\n무리하지 말고 천천히! 🙂"
                  "오늘의 스트레칭: 어깨·등 결림 해소\n\n1. 어깨 으쓱&내리기 (10회)\n2. 가슴 열기 (15초×3)\n3. 견갑골 모으기 (5초×10)\n4. 등 둥글게 말기 (10초×5)\n\n무리하지 말고 천천히! 🙂"
                  "오늘의 스트레칭: 손목·손가락 피로 해소\n\n1. 손목 굴신 (15초×양방향×양쪽)\n2. 손가락 벌리기 (10회)\n3. 손목 돌리기 (10회)\n4. 손바닥 밀기 (10초×3)\n\n무리하지 말고 천천히! 🙂"
                  "오늘의 스트레칭: 허리·골반 이완\n\n1. 의자 비틀기 (15초×양쪽)\n2. 무릎 당기기 (15초×양쪽)\n3. 골반 기울이기 (10회)\n4. 앞으로 숙이기 (15초×3)\n\n무리하지 말고 천천히! 🙂"
                  "오늘의 스트레칭: 하체 혈액순환 촉진\n\n1. 발뒤꿈치 올리기 (15회)\n2. 발끝 당기기 (15초×양쪽)\n3. 발목 알파벳 (A–Z)\n4. 발가락 쥐었다 펴기 (10회)\n\n무리하지 말고 천천히! 🙂"
                )
                IDX=$(( RANDOM % ${#STRETCHES[@]} ))
                echo -e "${STRETCHES[$IDX]}"
                ;;
              "08:20")
                echo -e "📝 오늘의 회고록 작성 시간입니다!\n해낸 점, 아쉬운 점, 앞으로의 계획을 적어보세요 :pencil:"
                ;;
              "08:40")
                echo -e "🔔 회고록 마감 20분 전입니다!\n아직 작성 못 하신 분들, 지금이 마지막 기회예요 :fire:"
                ;;
              *)
                return 1
                ;;
            esac
          }

          # schedule일 때만 시간 매칭, 수동/푸시는 테스트 메시지
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            if MSG=$(pick_message "$TIME_NOW"); then
              :
            elif MSG=$(pick_message "$TIME_PREV"); then
              :
            else
              echo "NO MATCH -> exit 0"
              exit 0
            fi
          else
            MSG="🧪 테스트 메시지입니다. (event=${GITHUB_EVENT_NAME})"
          fi

          echo "=== MSG ==="
          echo -e "$MSG"

          PAYLOAD=$(python3 - << 'PY'
import json, os
print(json.dumps({"text": os.environ["MSG"], "username": "JIYOONBOT"}))
PY
          )

          echo "=== POST ==="
          export MSG
          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP_CODE=$HTTP_CODE"
          echo "--- response ---"
          cat response.txt || true
          echo "--------------"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
        env:
          MSG: dummy
